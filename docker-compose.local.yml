services:
  webhooksmith-db:
    image: postgres:16-alpine
    container_name: webhooksmith_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: webhooksmith
      POSTGRES_USER: webhooksmith
      POSTGRES_PASSWORD: password
    ports:
      - 5432:5432
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      - webhooksmith_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhooksmith -d webhooksmith"]
      interval: 5s
      timeout: 5s
      retries: 20
  webhooksmith-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: webhooksmith_api
    restart: unless-stopped
    environment:
      DB_HOST: webhooksmith-db
      DB_PORT: 5432
      DB_NAME: webhooksmith
      DB_USER: webhooksmith
      DB_PASSWORD: password
      DB_LOGGING: true
      LOG_LEVEL: verbose
      PORT: 3030
      HOST: 0.0.0.0
      ALLOWED_ORIGINS: web,webhooksmith.angelin.foo
      COOKIE_DOMAIN: .angelin.foo
      SESSION_TTL: 604800000
      SWAGGER_ENABLED: true
      SWAGGER_PATH: /docs
      INITIAL_USERNAME: admin
      INITIAL_PASSWORD: password
    command: sh -c "pnpm db:migrate && node dist/main"
    ports:
      - 3030:3030
    depends_on:
      webhooksmith-db:
        condition: service_healthy
    networks:
      - webhooksmith_network
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: webhooksmith_web
    restart: unless-stopped
    environment:
      WEB_URL: https://webhooksmith-dev.angelin.foo # Optional for SEO
      API_URL: https://api-webhooksmith-dev.angelin.foo
      SOCKET_URL: wss://api-webhooksmith-dev.angelin.foo
    ports:
      - 3000:3000
    depends_on:
      - webhooksmith-api
    networks:
      - webhooksmith_network

networks:
  webhooksmith_network:
    name: webhooksmith_network
    external: false
